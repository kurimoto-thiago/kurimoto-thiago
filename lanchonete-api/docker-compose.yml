version: '3.9'

services:

  # ── Aplicação ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      target: runner
    container_name: lanchonete-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: lanchonete
      DB_USER: lanchonete_user
      DB_PASSWORD: lanchonete_pass
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lanchonete-net

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: lanchonete-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       lanchonete
      POSTGRES_USER:     lanchonete_user
      POSTGRES_PASSWORD: lanchonete_pass
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./infra/sql/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lanchonete_user -d lanchonete"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lanchonete-net

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: lanchonete-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - lanchonete-net

volumes:
  pg_data:
  redis_data:

networks:
  lanchonete-net:
    driver: bridge
